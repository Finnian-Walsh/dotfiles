name: Neovim Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        neovim: [stable, nightly]

    steps:
      - uses: actions/checkout@v4

      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}

      - name: Install git
        run: sudo apt-get update && sudo apt-get install -y git

      - name: Clone mini.nvim
        run: |
          mkdir -p ~/.local/share/nvim/site/pack/deps/start
          git clone https://github.com/nvim-mini/mini.test \
            ~/.local/share/nvim/site/pack/deps/start/mini.nvim

      - name: Run tests
        run: |
          nvim --headless \
            -c "lua MiniTest.run_file('minitest.lua')" \
            -c "qa!"
